services:
  dev:
    build:
      context: ..
      dockerfile: Dockerfile
    image: universal-dev:latest
    init: true
    command: sleep infinity
    working_dir: /workspace
    environment:
      ENABLE_GUI_BROWSER: ${ENABLE_GUI_BROWSER:-false}
      NOVNC_PORT: ${NOVNC_PORT:-6080}
      TZ: ${TZ:-UTC}
      KUBECONFIG: /home/dev/.kube/config
      AZURE_CONFIG_DIR: /home/dev/.azure
    ports:
      - "${NOVNC_PORT:-6080}:6080"
    volumes:
      # ── Project source ──────────────────────────────────────────────
      - ..:/workspace:cached
      # ── Docker-outside-of-Docker (optional — remove if not needed) ─
      - /var/run/docker.sock:/var/run/docker.sock
      # ── All state lives in named volumes — no host file sync ───────
      - dev-ssh:/home/dev/.ssh
      - dev-gitconfig:/home/dev/.gitconfig
      - dev-aws:/home/dev/.aws
      - dev-azure:/home/dev/.azure
      - dev-kube:/home/dev/.kube
      - dev-gh:/home/dev/.config/gh
      - dev-cache:/home/dev/.cache
      - dev-npm:/home/dev/.npm
      - dev-pipx:/home/dev/.local/share/pipx
      - dev-local-state:/home/dev/.local/state
      - dev-cargo:/home/dev/.cargo
      - dev-rustup:/home/dev/.rustup
      - dev-bash-history:/home/dev/.bash_history
      - dev-codex:/home/dev/.codex
      - dev-claude:/home/dev/.claude

volumes:
  dev-aws:
  dev-azure:
  dev-bash-history:
  dev-cache:
  dev-cargo:
  dev-claude:
  dev-codex:
  dev-gh:
  dev-gitconfig:
  dev-kube:
  dev-local-state:
  dev-npm:
  dev-pipx:
  dev-rustup:
  dev-ssh:
